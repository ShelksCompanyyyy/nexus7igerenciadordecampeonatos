  <!-- Simples CSS para visualizar -->
  <style>
    body { font-family: Arial, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    #painel { display: none; }
    input { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="auth">
    <h2>Login / Cadastro</h2>
    <input type="text" id="nick" placeholder="Nick"><br>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="senha" placeholder="Senha"><br>
    <button onclick="cadastrar()">Cadastrar</button>
    <button onclick="login()">Login</button>
  </div>

  <div id="painel">
    <h2 id="boasvindas"></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Script Supabase funcionando direto no HTML -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const client = createClient(
      "https://cnktlbsvtoobbftoqtka.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNua3RsYnN2dG9vYmJmdG9xdGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ0NjEsImV4cCI6MjA5MTE3MDQ2MX0.HJTapkPU8HXYOsXbNfLJwjwsWm9q4gdkU0464Uc_vXg"
    );

    async function cadastrar() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;
      const nick = document.getElementById("nick").value;

      const { data, error } = await client.auth.signUp({ email, password: senha });
      if (error) { alert(error.message); return; }

      const userId = data.user?.id;
      if (!userId) { alert("Confirme seu email antes de continuar!"); return; }

      await client.from("usuarios").insert([{ id: userId, Nome: nick, Gmail: email, Clã: "Nexus7i" }]);
      alert("Conta criada!");
    }

    async function login() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      const { error } = await client.auth.signInWithPassword({ email, password: senha });
      if (error) { alert(error.message); } 
      else { carregarUsuario(); }
    }

    async function carregarUsuario() {
      const { data } = await client.auth.getUser();
      if (!data.user) return;

      const { data: perfil } = await client.from("usuarios").select("Nome").eq("id", data.user.id).single();
      if (!perfil) { alert("Perfil não encontrado!"); return; }

      document.getElementById("auth").style.display = "none";
      document.getElementById("painel").style.display = "block";
      document.getElementById("boasvindas").innerText = "🎮 Bem-vindo, " + perfil.Nome;
    }

    async function logout() {
      await client.auth.signOut();
      location.reload();
    }

    carregarUsuario();
  </script>

</body>
</html>
