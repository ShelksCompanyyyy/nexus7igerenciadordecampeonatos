<!DOCTYPE html>
<html>
<head>
  <title>Login + Salvar</title>
</head>
<body>

  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>

  <h2>Perfil</h2>
  <input id="nome" placeholder="Nome"><br>
  <input id="cla" placeholder="Clã"><br>
  <button onclick="salvar()">Salvar Perfil</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabase = window.supabase.createClient(
      "https://cnktlbsvtoobbftoqtka.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNua3RsYnN2dG9vYmJmdG9xdGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ0NjEsImV4cCI6MjA5MTE3MDQ2MX0.HJTapkPU8HXYOsXbNfLJwjwsWm9q4gdkU0464Uc_vXg"
    );

    async function login() {
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      const { error } = await supabase.auth.signInWithPassword({
        email: email,
        password: senha
      });

      if (error) {
        alert("Erro no login: " + error.message);
      } else {
        alert("Login feito!");
      }
    }

    async function salvar() {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        alert("Você precisa logar primeiro!");
        return;
      }

      const nome = document.getElementById("nome").value;
      const cla = document.getElementById("cla").value;

      const { error } = await supabase
        .from('usuarios')
        .insert({
          id: user.id,
          nome: nome,
          gmail: user.email,
          cla: cla
        });

      if (error) {
        alert("Erro ao salvar: " + error.message);
      } else {
        alert("Perfil salvo!");
      }
    }
  </script>

</body>
</html>
