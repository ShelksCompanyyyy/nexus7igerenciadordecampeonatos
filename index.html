    <style>
      body { font-family: Arial, sans-serif; background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
      #root { width: 100%; max-width: 400px; text-align: center; }
      input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
      button { padding: 10px 20px; margin: 5px; border-radius: 5px; border: none; cursor: pointer; background: #1e88e5; color: #fff; }
      #painel { margin-top: 20px; }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Área de autenticação -->
      <div id="auth">
        <h2>Login / Cadastro</h2>
        <input type="text" id="nick" placeholder="Nick" /><br/>
        <input type="email" id="email" placeholder="Email" /><br/>
        <input type="password" id="senha" placeholder="Senha" /><br/>
        <button onclick="cadastrar()">Cadastrar</button>
        <button onclick="login()">Login</button>
        <p id="mensagem"></p>
      </div>

      <!-- Painel do usuário logado -->
      <div id="painel" style="display:none">
        <h1 id="boasvindas"></h1>
        <button onclick="logout()">Sair</button>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

      const client = createClient(
        "https://cnktlbsvtoobbftoqtka.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNua3RsYnN2dG9vYmJmdG9xdGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ0NjEsImV4cCI6MjA5MTE3MDQ2MX0.HJTapkPU8HXYOsXbNfLJwjwsWm9q4gdkU0464Uc_vXg"
      );

      const mensagem = document.getElementById("mensagem");

      async function cadastrar() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;
        const nick = document.getElementById("nick").value;

        mensagem.innerText = "Criando conta...";

        const { data, error } = await client.auth.signUp({ email, password: senha });

        if (error) {
          mensagem.innerText = "Erro: " + error.message;
          return;
        }

        const userId = data.user?.id;
        if (!userId) {
          mensagem.innerText = "Confirme seu email antes de continuar!";
          return;
        }

        await client.from("usuarios").insert([{ id: userId, Nome: nick, Gmail: email, Clã: "Nexus7i" }]);
        mensagem.innerText = "Conta criada com sucesso! Verifique seu email.";
      }

      async function login() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        mensagem.innerText = "Verificando login...";

        const { error } = await client.auth.signInWithPassword({ email, password: senha });

        if (error) {
          mensagem.innerText = "Erro: " + error.message;
          return;
        }

        await carregarUsuario();
      }

      async function carregarUsuario() {
        const { data } = await client.auth.getUser();

        if (!data.user) {
          mensagem.innerText = "Nenhum usuário logado.";
          return;
        }

        const { data: perfil, error } = await client
          .from("usuarios")
          .select("Nome")
          .eq("id", data.user.id)
          .single();

        if (error || !perfil) {
          mensagem.innerText = "Perfil não encontrado!";
          return;
        }

        document.getElementById("auth").style.display = "none";
        document.getElementById("painel").style.display = "block";
        document.getElementById("boasvindas").innerText = "🎮 Bem-vindo, " + perfil.Nome;
        mensagem.innerText = "";
      }

      async function logout() {
        await client.auth.signOut();
        location.reload();
      }

      // Verifica se já existe um usuário logado ao abrir a página
      carregarUsuario();
    </script>
  </body>
</html>
