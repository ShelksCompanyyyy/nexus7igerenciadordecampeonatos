<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS7i</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #0a0a0a;
}

.logo { color: red; }

.menu {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #050505;
    transition: 0.3s;
}

.menu a {
    display: block;
    padding: 15px;
    color: #aaa;
}

.menu.active { left: 0; }

.page {
    display: none;
    padding: 15px;
}

.page.active {
    display: block;
}

.card {
    background: #0a0a0a;
    border: 1px solid red;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">NEXUS7i</div>
    <div onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
    <a onclick="go('home')">Home</a>
    <a onclick="go('ranking')">Ranking</a>
    <a onclick="go('roleta')">Roleta</a>
    <a onclick="go('perfil')">Perfil</a>
    <a onclick="go('admin')">Admin</a>
</div>

<!-- PÁGINAS -->

<div id="home" class="page active">
    <div class="card">
        <h2>Bem-vindo</h2>
        <p>NEXUS7i E-Sports</p>
    </div>
</div>

<div id="ranking" class="page">
    <div class="card">
        <h2>Ranking</h2>
        <p>Em breve...</p>
    </div>
</div>

<div id="roleta" class="page">
    <div class="card">
        <h2>Roleta</h2>
        <button onclick="girar()">Girar</button>
        <p id="resultado"></p>
    </div>
</div>

<div id="perfil" class="page">
    <div class="card">
        <h2>Perfil</h2>
        <p>Kills: 0</p>
        <p>KD: 0.00</p>
    </div>
</div>

<div id="admin" class="page">
    <div class="card">
        <h2>ADM</h2>
        <button onclick="darGold()">Dar 100G</button>
        <p id="gold"></p>
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function go(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

function girar() {
    let premios = [5, 10, 20, 100];
    let premio = premios[Math.floor(Math.random()*premios.length)];
    document.getElementById("resultado").innerText = "Ganhou " + premio + "G";
}

let saldo = 0;

function darGold() {
    saldo += 100;
    document.getElementById("gold").innerText = "Saldo: " + saldo + "G";
}
</script>

</body>
</html>
